services:
  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    restart: unless-stopped
    environment:
      VIP_ENVIRONMENT: ${VIP_ENVIRONMENT:-production}
      VIP_DATABASE_URL: ${VIP_DATABASE_URL:?Set this in Coolify}
      VIP_JWT_SECRET_KEY: ${VIP_JWT_SECRET_KEY:?Set this in Coolify}
      VIP_ACCESS_TOKEN_EXPIRES_MINUTES: ${VIP_ACCESS_TOKEN_EXPIRES_MINUTES:-60}
      VIP_REFRESH_TOKEN_EXPIRES_DAYS: ${VIP_REFRESH_TOKEN_EXPIRES_DAYS:-7}
      VIP_CREATE_TABLES_ON_STARTUP: ${VIP_CREATE_TABLES_ON_STARTUP:-false}
      VIP_CORS_ALLOW_ORIGINS: ${VIP_CORS_ALLOW_ORIGINS:?Set this in Coolify}
      VIP_SMS_API_KEY: ${VIP_SMS_API_KEY:-}
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
